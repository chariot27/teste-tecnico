version: '3.8'

services:
  transferencias-api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5003-5004:8080" # Mapeia as rÈplicas para 5003 e 5004
    networks:
      - financeiro-net
    deploy:
      replicas: 2
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Data Source=/app/db/teste.db;Cache=Shared;Mode=ReadWriteCreate;
      - KafkaSettings__BootstrapServers=kafka:29092
    volumes:
      - "C:/Users/noname/Desktop/code/db:/app/db"
    restart: always

networks:
  financeiro-net:
    external: true
version: '3.8'

services:
  transferencias-api:
    container_name: ms-transferencias
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      # Ambos apontam para o mesmo arquivo mapeado
      - ConnectionStrings__DefaultConnection=Data Source=/app/db/teste.db
    volumes:
      # Mapeia a mesma pasta do host para este container também
      - "C:/Users/noname/Desktop/code/db:/app/db"
    restart: always